<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>The Lobby — Ordinary Game Jam</title>
<link rel="stylesheet" href="style.css" />
</head>
<body>
<canvas id="game"></canvas>

<audio id="bgm" src="Portal%20Lobby%20Drift.mp3" loop preload="auto"></audio>
<div id="audio-controls">
  <button id="mute-btn" type="button" title="mute music (M)" aria-label="mute music">🔊</button>
  <input id="volume-slider" type="range" min="0" max="1" step="0.01" value="0.35" aria-label="music volume" title="music volume" />
</div>

<div id="hud">
  <div id="username-row">
    <span id="username-text">loading…</span>
    <button id="rename-btn" type="button" title="rename (N)" aria-label="rename">✎</button>
  </div>
  <div id="peers">1 in lobby</div>
  <div id="hint">click to look · WASD move · <kbd>Space</kbd> jump · <kbd>E</kbd> pick up · sit · fly · <kbd>Q</kbd> backflip · click to shoot · <kbd>T</kbd>/<kbd>Enter</kbd> chat · <kbd>Y</kbd> emote · <kbd>N</kbd> rename · <kbd>M</kbd> mute · scroll zoom</div>
</div>

<div id="scores">
  <span class="score-item">⚽ <span id="score-soccer">0</span></span>
  <span class="score-item">🏀 <span id="score-basket">0</span></span>
  <span class="score-item" id="parkour-block">
    🏁 <span id="parkour-best">--:--</span>
    <span id="parkour-current" hidden></span>
  </span>
</div>
<div id="toast" aria-live="polite"></div>

<div id="race-overlay" hidden>
  <div id="race-countdown"></div>
  <div id="race-sentence-box">
    <span id="race-typed"></span><span id="race-cursor"></span><span id="race-remaining"></span>
  </div>
  <div id="race-stats"></div>
  <div class="race-hint">press <kbd>Esc</kbd> to forfeit</div>
</div>

<div id="leaderboard">
  <div class="leaderboard-title">🏁 PARKOUR BEST</div>
  <div id="leaderboard-rows">
    <div class="lb-empty">no runs yet</div>
  </div>
</div>

<div id="chat-box">
  <button id="chat-toggle" type="button" title="toggle chat (T)" aria-label="toggle chat">💬</button>
  <div id="chat-history"></div>
</div>
<div id="chat-log" aria-live="polite"></div>
<input id="chat-input" type="text" maxlength="140" autocomplete="off" placeholder="say something… (enter to send, esc to cancel)" />
<input id="name-input" type="text" maxlength="24" autocomplete="off" placeholder="your name… (enter to confirm, esc to cancel)" />
<div id="emote-wheel" hidden role="dialog" aria-label="Emote wheel"></div>

<script src="portal.js"></script>
<script type="module" src="game.js"></script>
</body>
</html>
